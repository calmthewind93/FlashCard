<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chinese Lesson Flashcards</title>
    <style>
		/* Universal Aesthetic Reset */
		body { 
			font-family: Arial; 
			display: flex; 
			flex-direction: column; 
			align-items: center; 
			justify-content: center; 
			min-height: 100vh; 
			background: radial-gradient(circle at top, #faf6f0 0%, #eae3d2 100%); /* Warm rice-paper tone background */
			margin: 0; 
			padding: 20px; 
			box-sizing: border-box; 
		}

		.progress { 
			font-size: 14px; 
			color: #726255; 
			margin-bottom: 15px; 
			font-weight: 600;
			letter-spacing: 1px;
			background: rgba(255, 255, 255, 0.6);
			padding: 6px 16px;
			border-radius: 20px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.03);
		}
		
		/* Premium Native Video Link Card Sizing Layout */
		.video-link-container { 
			width: 100%; 
			max-width: 420px; 
			margin-bottom: 25px; 
			display: none; 
		}

		.video-btn { 
			display: flex; 
			align-items: center; 
			justify-content: center; 
			gap: 12px; 
			width: 100%; 
			background: linear-gradient(135deg, #1877f2, #145dbf); 
			color: white; 
			text-decoration: none; 
			padding: 16px; 
			border-radius: 14px; 
			font-size: 16px; 
			font-weight: bold; 
			box-shadow: 0 4px 15px rgba(24, 119, 242, 0.25); 
			transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
			text-align: center; 
			box-sizing: border-box;
		}
		.video-btn:hover { 
			transform: translateY(-2px); 
			box-shadow: 0 6px 20px rgba(24, 119, 242, 0.35); 
		}
		.video-btn:active { 
			transform: translateY(0); 
		}

		/* Flashcard Container Decor */
		.card-container { 
			width: 100%; 
			max-width: 420px; 
			height: 300px; 
			perspective: 1200px; 
			cursor: pointer; 
			margin-bottom: 25px; 
		}

		.card { 
			width: 100%; 
			height: 100%; 
			position: relative; 
			transform-style: preserve-3d; 
			transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
			box-shadow: 0 10px 30px rgba(114, 98, 85, 0.15); 
			border-radius: 20px; 
		}
		.card.flipped { 
			transform: rotateY(180deg); 
		}

		/* Front & Back Faces Uniformity */
		.front, .back { 
			position: absolute; 
			width: 100%; 
			height: 100%; 
			backface-visibility: hidden; 
			border-radius: 20px; 
			display: flex; 
			flex-direction: column; 
			align-items: center; 
			justify-content: center; 
			padding: 30px; 
			box-sizing: border-box; 
			background-color: #ffffff;
			background-image: radial-gradient(#f3ede2 1px, transparent 1px); /* Subtle luxury geometric grid texture */
			background-size: 20px 20px;
		}
		
		.front { 
			border: 2px solid #bd2c2c; /* Traditional Oriental Crimson Border */
		}
		
		.back { 
			transform: rotateY(180deg); 
			text-align: center; 
			overflow-y: auto; 
			border: 2px solid #4a3b32; /* Deep earthy secondary color border */
		}

		/* Core Typography Polishing */
		.chinese { 
			font-family: "Kaiti", "STKaiti", "华文楷体", "KaiTi_GB2312", "楷体", "DFKai-SB", "Noto Serif SC", serif; 
			font-size: 38px; 
			font-weight: normal; 
			margin-bottom: 15px; 
			color: #1a1a1a; 
			text-align: center; 
			line-height: 1.4; 
		}
		
		.pinyin { 
			font-size: 21px; 
			color: #8c7662; 
			font-style: italic; 
			margin-bottom: 15px; 
			line-height: 1.3; 
			font-family: Georgia, serif;
		}
		
		.english { 
			font-size: 16px; 
			color: #2b2521; 
			line-height: 1.6; 
			background: #fffcf7; 
			padding: 14px 18px; 
			border-radius: 12px; 
			border-left: 5px solid #bd2c2c; 
			width: 100%; 
			box-sizing: border-box; 
			text-align: left; 
			white-space: pre-line; 
			box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
		}

		/* Unified Controller Layout Styles */
		.controls { 
			display: flex; 
			gap: 12px; 
			flex-wrap: wrap; 
			justify-content: center; 
			max-width: 420px; 
			width: 100%; 
		}

		button { 
			padding: 14px 20px; 
			font-size: 15px; 
			border: none; 
			background-color: #bd2c2c; /* Matching traditional red */
			color: white; 
			border-radius: 12px; 
			cursor: pointer; 
			transition: all 0.2s ease; 
			font-weight: bold; 
			box-shadow: 0 4px 10px rgba(189, 44, 44, 0.2); 
			flex: 1; 
			min-width: 85px; 
		}
		button:hover { 
			background-color: #a12323; 
			transform: translateY(-1px);
			box-shadow: 0 6px 14px rgba(189, 44, 44, 0.3);
		}
		button:active { 
			transform: scale(0.98); 
		}

		/* Specialized Shuffle Controller Design */
		.shuffle-btn { 
			background-color: #3b6b4c; /* Deep sage green */
			box-shadow: 0 4px 10px rgba(59, 107, 76, 0.2);
		}
		.shuffle-btn:hover { 
			background-color: #2e543b; 
			box-shadow: 0 6px 14px rgba(59, 107, 76, 0.3);
		}

		.hint { 
			color: #9c8e83; 
			font-size: 13px; 
			margin-top: 15px; 
			letter-spacing: 0.5px;
		}
		
		#error-msg { 
			color: #bd2c2c; 
			font-weight: bold; 
			text-align: center; 
			display: none; 
			margin-bottom: 20px; 
			background: #fff0f0;
			padding: 12px 24px;
			border-radius: 10px;
			border: 1px solid #ffcccc;
		}
	</style>

</head>
<body>

    <div id="error-msg">Không tìm thấy bài học này! Vui lòng kiểm tra lại liên kết.</div>
    
    <!-- PREMIUM NATIVE VIDEO BUTTON CONTAINER -->
    <div class="video-link-container" id="video-box">
        <a id="fb-reel-link" href="#" target="_blank" class="video-btn">
            🎬 Xem Video Gốc Trên Facebook (Tích Lũy Lượt Xem)
        </a>
    </div>

    <div class="progress" id="progress">Đang tải dữ liệu...</div>
    
    <div class="card-container" onclick="flipCard()">
        <div class="card" id="flashcard">
            <div class="front">
                <div class="chinese" id="front-chinese">...</div>
                <div class="hint">(Nhấp để lật mặt sau)</div>
            </div>
            <div class="back">
                <div class="chinese" id="back-chinese">...</div>
                <div class="pinyin" id="back-pinyin">...</div>
                <div class="english" id="back-english">...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard(event)">⬅️ Trước</button>
        <button onclick="flipCard(event)">🔄 Lật</button>
        <button onclick="nextCard(event)">Sau ➡️</button>
        <!-- PROACTIVE FEATURE INTEGRATION: DYNAMIC SHUFFLE CONTROLLER -->
        <button onclick="shuffleCards(event)" class="shuffle-btn">🔀 Trộn</button>
    </div>

    <script>
        let vocab = [];
        let currentIndex = 0;

        const urlParams = new URLSearchParams(window.location.search);
        const lessonName = urlParams.get('lesson');
		if (!lessonName) {
			showError(); // Shows the "Không tìm thấy bài học này" message instantly
		}

        fetch(`lessons/${lessonName}.csv`)
            .then(response => {
                if (!response.ok) throw new Error('File not found');
                return response.text();
            })
            .then(data => {
                parseCSV(data);
                if (vocab.length > 0) {
                    updateCard();
                } else {
                    showError();
                }
            })
            .catch(error => {
                console.error(error);
                showError();
            });

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                let cleanRow = [];
                let row = lines[i];
                let inQuotes = false;
                let currentField = '';
                
                for (let charIndex = 0; charIndex < row.length; charIndex++) {
                    let char = row[charIndex];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        cleanRow.push(currentField.trim());
                        currentField = '';
                    } else {
                        currentField += char;
                    }
                }
                cleanRow.push(currentField.trim());

                if (cleanRow.length >= 2) {
                    if (cleanRow[0].toLowerCase() === "video_url") {
                        setupVideo(cleanRow[1]); 
                        continue;
                    }
                    if (cleanRow.length >= 3) {
                        vocab.push({
                            chinese: cleanRow[0],
                            pinyin: cleanRow[1],
                            english: cleanRow[2]
                        });
                    }
                }
            }
        }

        function setupVideo(rawUrl) {
            const videoBox = document.getElementById('video-box');
            const linkAnchor = document.getElementById('fb-reel-link');
            linkAnchor.href = rawUrl; // Safely assigns the direct Facebook link
            videoBox.style.display = "block";
        }

        function showError() {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('progress').style.display = 'none';
        }

        function updateCard() {
            const card = document.getElementById('flashcard');
            card.classList.remove('flipped');
            setTimeout(() => {
                document.getElementById('front-chinese').innerText = vocab[currentIndex].chinese;
                document.getElementById('back-chinese').innerText = vocab[currentIndex].chinese;
                document.getElementById('back-pinyin').innerText = vocab[currentIndex].pinyin;
                document.getElementById('back-english').innerHTML = vocab[currentIndex].english;
                document.getElementById('progress').innerText = `Thẻ ${currentIndex + 1} trên ${vocab.length}`;
            }, 150);
        }

        function flipCard(event) {
            if (event) event.stopPropagation();
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function nextCard(event) {
            if (event) event.stopPropagation();
            if (vocab.length === 0) return;
            currentIndex = (currentIndex + 1) % vocab.length;
            updateCard();
        }

        function prevCard(event) {
            if (event) event.stopPropagation();
            if (vocab.length === 0) return;
            currentIndex = (currentIndex - 1 + vocab.length) % vocab.length;
            updateCard();
        }

        /* SHUFFLE LOGIC */
        function shuffleCards(event) {
            if (event) event.stopPropagation();
            if (vocab.length <= 1) return;
            
            // Knuth-Fisher-Yates Shuffle algorithm execution
            for (let i = vocab.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [vocab[i], vocab[j]] = [vocab[j], vocab[i]];
            }
            currentIndex = 0;
            updateCard();
        }
    </script>
</body>
</html>
